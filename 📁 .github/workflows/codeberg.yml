name: ✅ Check Codeberg Status

on:
  push:
    branches: [develop]

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: 🔍 check Codeberg
        run: |
          REPO_URL="https://codeberg.org/api/v1/repos/ITJonesy00/starter-devsecops-ia-template"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$REPO_URL")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Status: $HTTP_CODE"
          echo "$BODY" | jq .
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Codeberg ONLINE"
            exit 0
          else
            echo "❌ Codeberg ERROR ($HTTP_CODE)"
            exit 1
          fi

      - name: 📊 
        if: success()
        run: |
          curl -s "https://codeberg.org/api/v1/repos/ITJonesy00/starter-devsecops-ia-template" | jq '{
            name: .name,
            stars: .stars_count,
            forks: .forks_count,
            updated: .updated_at
          }'

      - name: ⚠️ warning
        if: failure()
        run: echo "❌ Codeberg OFFLINE - $(date)"
