name: Check Codeberg Status Homelab-1

on:
  push:
    branches: [master]
  #schedule:
  #  - cron: '*/30 * * * *'  # Aussi en periodic check

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Check Codeberg API
        id: health
        run: |
          REPO_URL="https://codeberg.org/api/v1/repos/ITJonesy00/starter-devsecops-ia-template"
          
          # Http status
          HTTP_CODE=$(curl -s -w "%{http_code}" -o response.json "$REPO_URL")
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          cat response.json | jq . 2>/dev/null || cat response.json
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Codeberg ONLINE"
            jq '{name: .name, updated: .updated_at}' response.json
            exit 0
          else
            echo "❌ Codeberg ERROR ($HTTP_CODE)"
            exit 1
          fi

      - name: Alert on failure
        if: failure()
        run: |
          echo "⚠️ Health check failed - $(date)"
          echo "Repo might be unreachable or API changed"
